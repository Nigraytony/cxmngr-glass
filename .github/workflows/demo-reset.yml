name: Reset Demo Project

# Nightly wipe + re-seed of the shared self-serve demo project.
# Calls POST /api/demo/reset (protected by a shared secret header).
#
# Required GitHub repository secrets:
#   DEMO_RESET_URL  full URL, e.g. https://cxmngr-backend-api.azurewebsites.net/api/demo/reset
#   DEMO_RESET_KEY  must match the backend's DEMO_RESET_KEY env var (Azure App Service config)

on:
  schedule:
    # 07:00 UTC daily (~02:00 US Central / 03:00 US Eastern)
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Call demo reset endpoint
        env:
          DEMO_RESET_URL: ${{ secrets.DEMO_RESET_URL }}
          DEMO_RESET_KEY: ${{ secrets.DEMO_RESET_KEY }}
        run: |
          if [ -z "$DEMO_RESET_URL" ] || [ -z "$DEMO_RESET_KEY" ]; then
            echo "::error::DEMO_RESET_URL and DEMO_RESET_KEY repository secrets must be set."
            exit 1
          fi
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$DEMO_RESET_URL" \
            -H "x-demo-reset-key: $DEMO_RESET_KEY")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          test "$code" = "200"
